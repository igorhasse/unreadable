name: Deploy

on:
  push:
    branches: [main]
    # Skip deploys for changes that don't affect the Worker bundle.
    # content/posts/*.md is runtime content (loaded by lib/posts.ts), so it
    # is intentionally NOT in this list — post edits must redeploy.
    paths-ignore:
      - "README.md"
      - "CLAUDE.md"
      - "docs/**"
      - ".github/**"
      - ".husky/**"
      - "tests/**"
      - ".gitignore"
      - "LICENSE"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --immutable
      - name: Deploy to Cloudflare Workers
        run: yarn vinext deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Build-time env vars (VITE_*) are inlined into the client bundle.
          # If unset in repo Secrets, the newsletter form goes into "error"
          # state with the config-instructions message.
          VITE_MAILCHIMP_URL: ${{ secrets.VITE_MAILCHIMP_URL }}
