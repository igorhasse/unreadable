name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --immutable
      - run: yarn run lint
      - run: yarn run format
      - run: yarn run typecheck
      - run: yarn run test --coverage
      - run: yarn run build

  smoke:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --immutable
      - run: yarn run build
      - name: Start prod server
        run: |
          yarn run start > /tmp/prod.log 2>&1 &
          for i in {1..30}; do
            if curl -sf http://localhost:3000/pt-BR > /dev/null; then
              echo "Server ready"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 1
          done
      - run: yarn run test:smoke
      - name: Server log (on failure)
        if: failure()
        run: cat /tmp/prod.log

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --immutable
      - run: yarn npm audit --severity high --recursive
